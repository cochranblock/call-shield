plugins {
    id 'com.android.application'
}

android {
    namespace 'org.cochranblock.callshield'
    compileSdk 35

    defaultConfig {
        applicationId "org.cochranblock.callshield"
        minSdk 29  // Android 10 — CallScreeningService requires API 29+
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Zero cloud dependencies. Everything on-device.
}
